// CORS д»ЈзҗҶеҮҪж•°
async function corsFetch(url, options = {}) {
    const proxyUrl = https://api.codetabs.com/v1/proxy?quest=;
    try {
        return await fetch(proxyUrl, options);
    } catch (e) {
        console.error('CORS proxy failed:', e);
        throw e;
    }
}

        async getAllPrices() {
            try {
                // з”ҜдҪёз•ЁйҗңжӢҢжҸЈжө й”Ӣзүё
                const spotResponse = await corsFetch('https://api.binance.com/api/v3/ticker/bookTicker');
                const spotData = await spotResponse.json();
                
                const prices = {};
                spotData.forEach(item => {
                    if (item.symbol.endsWith('USDT')) {
                        const symbol = item.symbol.replace('USDT', '');
                        prices[symbol] = {
                            bid: parseFloat(item.bidPrice),
                            ask: parseFloat(item.askPrice),
                            last: (parseFloat(item.bidPrice) + parseFloat(item.askPrice)) / 2
                        };
                    }
                });
                
                console.log(`Binance APIй‘ҫеі°еҪҮйҚ’?{Object.keys(prices).length}ж¶“оҒ„з«өз»үе¶Үж®‘зҖ№еұҫжҡЈжө й”ӢзүёйҸҒзүҲеөҒ`);
                return prices;
            } catch (error) {
                console.error('Binance API error:', error);
                return {};
            }
        }
    },

    // Bithumb API
    BithumbAPI: {
        async getAllPrices() {
            try {
                // жЈЈж §еҺӣй‘ҫеі°еҪҮйҺөвӮ¬йҸҲеӨҠз«өз»үе¶Үж®‘йҚ’жҘ„гҖғ

                const prices = {};
                if (tickerData.status === '0000' && tickerData.data) {
                    const currencyList = Object.keys(tickerData.data).filter(key => key !== 'date');
                    
                    // йҚ’е—ҳеЈ’й‘ҫеі°еҪҮе§ЈеҝҺйҮңз”ҜдҪәоқ’йҗЁеӢ®о…№йҚ—жӣ зҝұйҸҒзүҲеөҒ

                        const batch = currencyList.slice(i, i + batchSize);

                            const symbol = key.replace('_KRW', '');
                            const orderbookUrl = `https://api.bithumb.com/public/orderbook/${symbol}_KRW`;

                                    if (orderbookData.status === '0000' && orderbookData.data) {

                                        const asks = orderbookData.data.asks || [];
                                        const lastPrice = parseFloat(tickerData.data[key].closing_price) || null;
                                        
                                        const bidPrice = bids.length > 0 ? parseFloat(bids[0].price) : null;
                                        const askPrice = asks.length > 0 ? parseFloat(asks[0].price) : null;

                                    }
                                })
                                .catch(error => {
                                    console.error(`Bithumb orderbook API error for ${symbol}:`, error);
                                });
                        });
                        
                        await Promise.all(promises);
                        // й–¬еһ®еҺӨAPIз’Үй”Ӣзң°жқ©еӣҰз°¬жЈ°жҲ з®’
                        await new Promise(resolve => setTimeout(resolve, 100));

                return {};

                    const marketResponse = await corsFetch('https://api.upbit.com/v1/market/all');

function formatPrice(num) {
    if (num === undefined || num === null) return '-';
    if (num >= 1000) return num.toFixed(2);
    if (num >= 1) return num.toFixed(4);
    return num.toFixed(6);
}

// з’Ғпј„з•»жҝӮжҘҖеҹ„йҸҲиҪ°зҙ°
function calculateArbitrage() {
    allOpportunities = [];
    const markets = config.currentMarket === 'all' ? ['spot', 'contract'] : [config.currentMarket];
    
    markets.forEach(market => {
        coinList.forEach(coin => {
            const binance = priceData.binance[market][coin];
            const bithumb = priceData.bithumb.spot[coin];
            const upbit = priceData.upbit.spot[coin];
            const okx = priceData.okx[market][coin];
            
            if (!binance) return;
            
            // жқ©еӣЁжҠӨйҺәеӨүжӢұ1/йҚ—?йҺёеӮҡеҙҹй–ІеҝҺз¶ҶжөңеәЁж§ҮйҚҠиӮ©ж®‘з”ҜдҪәоқ’ (USDTжө еі°вӮ¬?
            if (!binance || !binance.bid || !binance.ask) return;
            if (binance.bidAmount < config.minOrderAmount || binance.askAmount < config.minOrderAmount) return;
            
            // еҰ«вӮ¬йҸҢгғҰж§ёйҚҡпёҪж№ҒйҗӘзҶ·з–„йҗЁеӢӘзҺҜйҸҚе…јжҡҹйҺ№оҮҶзҙҷж¶“е¶Ҷж§ёйҗўзҶёеһҡйҗЁеӢҜж®ўйҸҲиҪ°зҺҜйҸҚзЎ·зҙҡ
            const hasRealBinancePrice = exchangeRealPrices.binance[coin];
            const hasRealOkxPrice = exchangeRealPrices.okx[coin];
            const hasRealBithumbPrice = exchangeRealPrices.bithumb[coin];
            
            // й‘·еҶІзҡҜй—ҮвӮ¬з‘•дҪ·з«ҙж¶“оҒғж°ҰйҸ„ж’ҙеўҚйҗЁеӢӯж№ЎзҖ№зӮ°зҺҜйҸҚзЎ·зҙқйҚҡп№ҖеһҜз’әе® з№ғ
            if (!hasRealBinancePrice && !hasRealOkxPrice && !hasRealBithumbPrice) return;
            
            // ------------------------------
            // 1. з”ҜдҪёз•Ё йҲ«?Bithumb жҝӮжҘҖеҹ„ (жө е‘Ҝе№Үз’җ?
            // ------------------------------
            if (market === 'spot' && bithumb && exchangeRealPrices.bithumb[coin] && bithumb.bid && bithumb.ask) {
                // йҚҷоҒ…ж№ҒиӨ°жҸғithumbзәӯоҶјз–„йҸҲеӨҺоҮҡз”ҜдҪәоқ’йҗЁеҮЁRWжөңгӮҶж§—зҖөйҖӣз¬–bidйҚңе®Һskй–®жҲ’з¬үж¶“з°„ullйҸғи®№зҙқйҺөе¶Ҳо…ёз» жҘҖоҡңйҚ’в•ӮжәҖжөј?                // з”ҜдҪёз•Ё йҲ«?Bithumb
                const bithumbBidUsdt = bithumb.bid / config.krwUsdRate;
                const spread1 = ((bithumbBidUsdt - binance.ask) / binance.ask) * 100;
                const profit1 = spread1 - config.feeRate;
                
                if (profit1 > config.profitThreshold) {
                    allOpportunities.push({
                        symbol: coin,
                        type: 'binance-bithumb',
                        market: market,
                        buyExchange: 'з”ҜдҪёз•Ё',
                        buyPrice: binance.ask,
                        buyPriceUnit: 'USDT',
                        sellExchange: 'Bithumb',
                        sellPrice: bithumb.bid,
                        sellPriceUnit: 'KRW',
                        sellPriceUsdt: bithumbBidUsdt,
                        spread: spread1,
                        profit: profit1,
                        direction: 'йҰғж‘ң з”ҜдҪёз•ЁйҲ«жү•ithumb'
                    });
                }
                
                // Bithumb йҲ«?з”ҜдҪёз•Ё
                const bithumbAskUsdt = bithumb.ask / config.krwUsdRate;
                const spread2 = ((binance.bid - bithumbAskUsdt) / bithumbAskUsdt) * 100;
                const profit2 = spread2 - config.feeRate;
                
                if (profit2 > config.profitThreshold) {
                    allOpportunities.push({
                        symbol: coin,
                        type: 'binance-bithumb',
                        market: market,
                        buyExchange: 'Bithumb',
                        buyPrice: bithumb.ask,
                        buyPriceUnit: 'KRW',
                        sellExchange: 'з”ҜдҪёз•Ё',
                        sellPrice: binance.bid,
                        sellPriceUnit: 'USDT',
                        sellPriceUsdt: binance.bid,
                        spread: spread2,
                        profit: profit2,
                        direction: 'йҰғж‘ӣ BithumbйҲ«жҺ‘з«өзҖ№?
                    });
                }
            }
            
            // ------------------------------
            // 2. з”ҜдҪёз•Ё йҲ«?Upbit жҝӮжҘҖеҹ„ (жө е‘Ҝе№Үз’җ?
            // ------------------------------
            if (market === 'spot' && upbit && exchangeRealPrices.binance[coin]) {
                // йҚҷоҒ…ж№ҒиӨ°ж’із«өзҖ№еӨҢвҖҳзҖ№зӮҙж№Ғз’ҮгғҘз«өз»үе¶Үж®‘USDTжөңгӮҶж§—зҖөи§„жӨӮй”ӣеұҫеў з’Ғпј„з•»жҝӮжҘҖеҹ„йҸҲиҪ°зҙ°
                // з”ҜдҪёз•Ё йҲ«?Upbit
                const spread3 = ((upbit.bid - binance.ask) / binance.ask) * 100;
                const profit3 = spread3 - config.feeRate;
                
                if (profit3 > config.profitThreshold) {
                    allOpportunities.push({
                        symbol: coin,
                        type: 'binance-upbit',
                        market: market,
                        buyExchange: 'з”ҜдҪёз•Ё',
                        buyPrice: binance.ask,
                        buyPriceUnit: 'USDT',
                        sellExchange: 'Upbit',
                        sellPrice: upbit.bid,
                        sellPriceUnit: 'USDT',
                        sellPriceUsdt: upbit.bid,
                        spread: spread3,
                        profit: profit3,
                        direction: 'йҰғж‘ң з”ҜдҪёз•ЁйҲ«жү·pbit'
                    });
                }
                
                // Upbit йҲ«?з”ҜдҪёз•Ё
                const spread4 = ((binance.bid - upbit.ask) / upbit.ask) * 100;
                const profit4 = spread4 - config.feeRate;
                
                if (profit4 > config.profitThreshold) {
                    allOpportunities.push({
                        symbol: coin,
                        type: 'binance-upbit',
                        market: market,
                        buyExchange: 'Upbit',
                        buyPrice: upbit.ask,
                        buyPriceUnit: 'USDT',
                        sellExchange: 'з”ҜдҪёз•Ё',
                        sellPrice: binance.bid,
                        sellPriceUnit: 'USDT',
                        sellPriceUsdt: binance.bid,
                        spread: spread4,
                        profit: profit4,
                        direction: 'йҰғж‘ӣ UpbitйҲ«жҺ‘з«өзҖ№?
                    });
                }
            }
            

            
            // ------------------------------
            // 4. з”ҜдҪёз•Ё йҲ«?OKX жҝӮжҘҖеҹ„ (йҗңжӢҢжҸЈ/йҚҡе ўе®і)
            // ------------------------------
            if (okx && exchangeRealPrices.binance[coin]) {
                // йҚҷоҒ…ж№ҒиӨ°ж’із«өзҖ№еӨҢвҖҳзҖ№зӮҙж№Ғз’ҮгғҘз«өз»үе¶Үж®‘жөңгӮҶж§—зҖөи§„жӨӮй”ӣеұҫеў з’Ғпј„з•»жҝӮжҘҖеҹ„йҸҲиҪ°зҙ°
                // з”ҜдҪёз•Ё йҲ«?OKX
                const spread7 = ((okx.bid - binance.ask) / binance.ask) * 100;
                const profit7 = spread7 - config.feeRate;
                
                if (profit7 > config.profitThreshold) {
                    allOpportunities.push({
                        symbol: coin,
                        type: 'binance-okx',
                        market: market,
                        buyExchange: 'з”ҜдҪёз•Ё',
                        buyPrice: binance.ask,
                        buyPriceUnit: 'USDT',
                        sellExchange: 'OKX',
                        sellPrice: okx.bid,
                        sellPriceUnit: 'USDT',
                        sellPriceUsdt: okx.bid,
                        spread: spread7,
                        profit: profit7,
                        direction: 'йҰғж‘ң з”ҜдҪёз•ЁйҲ«жүҘKX'
                    });
                }
                
                // OKX йҲ«?з”ҜдҪёз•Ё
                const spread8 = ((binance.bid - okx.ask) / okx.ask) * 100;
                const profit8 = spread8 - config.feeRate;
                
                if (profit8 > config.profitThreshold) {
                    allOpportunities.push({
                        symbol: coin,
                        type: 'binance-okx',
                        market: market,
                        buyExchange: 'OKX',
                        buyPrice: okx.ask,
                        buyPriceUnit: 'USDT',
                        sellExchange: 'з”ҜдҪёз•Ё',
                        sellPrice: binance.bid,
                        sellPriceUnit: 'USDT',
                        sellPriceUsdt: binance.bid,
                        spread: spread8,
                        profit: profit8,
                        direction: 'йҰғж‘ӣ OKXйҲ«жҺ‘з«өзҖ№?
                    });
                }
            }
        });
    });
    
    // йҺёеӨҠеҹ„еЁ‘пёҪеё“жҗҙ?    allOpportunities.sort((a, b) => b.profit - a.profit);
}

// еЁ“еҸүз…Ӣзҗӣг„Ұзүё
function renderTable() {
    const tableBody = document.getElementById('dataTable');
    const searchText = document.getElementById('searchInput').value.toLowerCase();
    
    // жқ©еӣЁжҠӨйҸҒзүҲеөҒ
    let filtered = allOpportunities;
    
    if (config.currentTab !== 'all') {
        filtered = filtered.filter(item => item.type === config.currentTab);
    }
    
    if (searchText) {
        filtered = filtered.filter(item => 
            item.symbol.toLowerCase().includes(searchText) ||
            item.buyExchange.toLowerCase().includes(searchText) ||
            item.sellExchange.toLowerCase().includes(searchText)
        );
    }
    
    // йҸҮеӯҳжҹҠзјҒзҶ»о…ё
    // з’Ғпј„з•»иӨ°ж’іеў з»—п№ҖжӮҺйҺёеӮҡеҙҹй–ІеҝҡоӣҰе§№еӮңж®‘з”ҜдҪәоқ’йҸҒдјҙеҷә
    const validCoins = coinList.filter(coin => {
        const data = coinBaseData[coin];
        return data && data.bidAmount >= config.minOrderAmount && data.askAmount >= config.minOrderAmount;
    }).length;
    
    document.getElementById('coinCount').textContent = validCoins;
    document.getElementById('opportunityCount').textContent = filtered.length;
    document.getElementById('krwRate').textContent = formatNumber(config.krwUsdRate, 2);
    document.getElementById('orderThreshold').textContent = `${config.minOrderAmount}U`;
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    
    if (filtered.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="10" style="text-align:center; color:#5a6f8f; padding:40px;">йҸҶеӮӣжЈӨз»—п№ҖжӮҺйҸүвҖІж¬ўйҗЁеӢ«оҡңйҚ’в•ӮжәҖжөј?/td></tr>`;
        return;
    }
    
    // еЁ“еҸүз…Ӣзҗӣг„Ұзүё
    tableBody.innerHTML = filtered.map(item => {
        const profitClass = item.profit > 2 ? 'high-profit' : 'profit';
        const exchangeTagBuy = item.buyExchange === 'з”ҜдҪёз•Ё' ? 'binance' : (item.buyExchange === 'Bithumb' ? 'bithumb' : (item.buyExchange === 'Upbit' ? 'upbit' : 'okx'));
        const exchangeTagSell = item.sellExchange === 'з”ҜдҪёз•Ё' ? 'binance' : (item.sellExchange === 'Bithumb' ? 'bithumb' : (item.sellExchange === 'Upbit' ? 'upbit' : 'okx'));
        const marketBadge = item.market === 'spot' ? '<span style="background:#2a3f5f; padding:2px 6px; border-radius:3px; font-size:11px;">йҗңжӢҢжҸЈ</span>' : '<span style="background:#ff9800; padding:2px 6px; border-radius:3px; font-size:11px;">йҚҡе ўе®і</span>';
        
        return `
            <tr class="opportunity">
                <td><strong>${item.symbol}</strong></td>
                <td>${marketBadge}</td>
                <td>
                    <span class="exchange-tag ${exchangeTagBuy}">${item.buyExchange}</span>
                    йҲ«?                    <span class="exchange-tag ${exchangeTagSell}">${item.sellExchange}</span>
                </td>
                <td>${formatPrice(item.buyPrice)} ${item.buyPriceUnit}</td>
                <td>${formatPrice(item.sellPrice)} ${item.sellPriceUnit}</td>
                <td>${formatPrice(item.sellPriceUsdt)} USDT</td>
                <td>${item.spread > 0 ? '+' : ''}${formatNumber(item.spread, 2)}%</td>
                <td class="${profitClass}">+${formatNumber(item.profit, 2)}%</td>
                <td>${item.direction}</td>
                <td><span class="profit">йҰғж•ҹ йҚҷоҲҡоҡңйҚ’?/span></td>
            </tr>
        `;
    }).join('');
    
    addLog(`йүҒ?йҚ’й”ӢжҹҠзҖ№еұҫеһҡй”ӣеұҪеҪӮйҗң?${filtered.length} ж¶“оҒ„оҡңйҚ’в•ӮжәҖжөјжӯҡ, 'success');
    
    // йҸҲеӨҠоҡңйҚ’в•ӮжәҖжөјж°ӯжӨӮйҺәг„©вӮ¬дҫҖо—Јж¶”п№ӮвӮ¬ж°ұз…Ў
    if (filtered.length > 0) {
        sendArbitrageNotification(filtered);
    }
}

// йҚ’й”ӢжҹҠйҸҒзүҲеөҒ
async function refreshData() {
    // жөјжЁәеҺӣй‘ҫеі°еҪҮзҖ№зӮөжҙҸйҸҒзүҲеөҒ
    await fetchRealPrices();
    calculateArbitrage();

// йҚҷжҲҰвӮ¬дҪёоҡңйҚ’в•ӮжәҖжөјж°¶вӮ¬ж°ұз…Ў
async function sendArbitrageNotification(opportunities) {
    addLog(`йҰғж”і еҰ«вӮ¬йҸҢгғҰеё№й–«дҪ№жҪҜжө ? webhookEnabled=${config.webhookEnabled}, hasWebhook=${!!config.feishuWebhook}, opportunities=${opportunities.length}`, 'info');
    
    if (!config.webhookEnabled || !config.feishuWebhook || opportunities.length === 0) return;
    
    // жқ©еӣЁжҠӨйҚ‘е“„еҹ„еЁ‘пё№еўәй–«ж°ұз…Ўй—ғе қвӮ¬иӮ©ж®‘йҸҲиҪ°зҙ°
    const highProfitOpportunities = opportunities.filter(item => {
        const isMatch = item.profit >= config.notificationThreshold;
        addLog(`  з”ҜдҪәоқ’${item.symbol}: йҚ’в•ӮйјҺ${item.profit.toFixed(2)}% >= ${config.notificationThreshold}% ? ${isMatch}`, 'info');
        return isMatch;
    });
    
    if (highProfitOpportunities.length === 0) {
        addLog(`йҲ©зҷёз¬Қ йҚҷжҲ е№Ү${opportunities.length}ж¶“оҒ…жәҖжөјж°ҫзҙқжөЈе—ӣе…ҳжөЈеәқз°¬й–«ж°ұз…Ўй—ғе қвӮ¬?{config.notificationThreshold}%й”ӣеұјз¬үйҺәг„©вӮ¬д№Ј, 'info');
        return;
    }
    
    // йҚҗеі°еөҲйҸғе •жЈҝйҺәСғеҹ—й”ӣеІ„дј©йҚҸе¶үо•¶з»»дҪёеҪӮй–«?    const now = Date.now();
    const timeLeft = Math.ceil((config.notificationCooldown - (now - config.lastNotificationTime)) / 1000);
    if (now - config.lastNotificationTime < config.notificationCooldown) {
        addLog(`йҲ©зҷёз¬Қ йҚҷжҲ е№Ү${highProfitOpportunities.length}ж¶“оҒҲзҸ®йҚ’в•ӮйјҺйҸҲиҪ°зҙ°й”ӣеұјзөҫжҫ¶еӢӘз°¬йҚҗеі°еөҲйҸғе •жЈҝй”ӣеұҪеўҝжөЈ?{timeLeft}з»үжҠҲ, 'info');
        return;
    }
    config.lastNotificationTime = now;
    
    addLog(`йүҒ?е©ҠВӨеҶ»йҺәг„©вӮ¬дҪ№жҪҜжө и®№зҙқйҚҸ?{highProfitOpportunities.length}ж¶“оҒҲзҸ®йҚ’в•ӮйјҺйҸҲиҪ°зҙ°`, 'success');
    addLog(`йҰғж”§ е§қпҪ…ж№ӘйҺәг„©вӮ¬дҪёеҹҢжӨӢзӮ°еҠҹ: ${config.feishuWebhook}`, 'info');
    
    // йҚҷоҒ„еҪҮйҚ“?ж¶“оҒ„еҹ„еЁ‘пёҪжё¶жҘӮжЁјж®‘йҸҲиҪ°зҙ°
    const topOpportunities = highProfitOpportunities.slice(0, 5);
    
    try {
        const content = topOpportunities.map((item, index) => 
            `**${index + 1}. ${item.symbol} ${item.market === 'spot' ? 'йҗңжӢҢжҸЈ' : 'йҚҡе ўе®і'}**\n` +
            `йҰғжҚҒ йҚ’в•ӮйјҺ: +${item.profit.toFixed(2)}%\n` +
            `йҰғж”§ йҸӮз‘°жӮң: ${item.direction}\n` +
            `йҰғжҢө ж¶”жқҝеҸҶжө ? ${item.buyPrice.toFixed(4)} ${item.buyPriceUnit}\n` +
            `йҰғжҢ» йҚ—ж §еҡӯжө ? ${item.sellPrice.toFixed(4)} ${item.sellPriceUnit}`
        ).join('\n\n');
        
        const notification = {
            msg_type: "interactive",
            card: {
                header: {
                    title: {
                        tag: "plain_text",
                        content: `йҰғж•ҹ йҚҷжҲ е№Ү${highProfitOpportunities.length}ж¶“оҒҲзҸ®йҚ’в•ӮйјҺжҝӮжҘҖеҹ„йҸҲиҪ°зҙ°(йҲ®?{config.notificationThreshold}%)й”ӣд№Ј
                    },
                    template: "red"
                },
                elements: [
                    {
                        tag: "div",
                        text: {
                            tag: "lark_md",
                            content: content
                        }
                    },
                    {
                        tag: "hr"
                    },
                    {
                        tag: "note",
                        elements: [
                            {

                                content: `йҸҮеӯҳжҹҠйҸғе •жЈҝ: ${new Date().toLocaleString()}`
                            }
                        ]
                    }
                ]
            }
        };
        
        // жөЈи·Ёж•Өno-corsеҰҜвҖізҙЎйҚҷжҲҰвӮ¬дҫҠзҙқзјҒжӣЎз№ғеЁҙеҝҡоқҚйҚЈг„Ёжі•йҚ©зҶјжӘәйҚ’?        await corsFetch(config.feishuWebhook, {

        addLog(`йҰғжҢ• еЁ‘е ҹдј…йҚҗе‘ӯоҶҗ: ${JSON.stringify(notification)}`, 'info');
    } catch (error) {

        addLog('йҰғжҢ• жқ©ж¬җж§ёеЁҙеҝҡоқҚйҚЈг„Ёжі•йҚ©зҶјжӘәйҚ’и·әоҮұй‘·еҜёж®‘й”ӣеІ„е„ҙзјғжҸ’еҹҢйҸҲе¶…е§ҹйҚЈг„ҘжӮ—жөјж°іеҡңйҚ”г„Ұо„ңз”ҜзЁҝдјҗжөЈ?, 'warning');
