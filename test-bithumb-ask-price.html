<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bithumb卖1价测试</title>
    <style>
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #00c853;
            text-align: center;
        }
        .panel {
            background: #141b2d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #2a3f5f;
        }
        .btn {
            background: #00c853;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #00a843;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a3f5f;
        }
        th {
            background: #1a2332;
            color: #8ba4be;
        }
        tr:hover {
            background: #1a2332;
        }
        .log-panel {
            background: #0a0e1a;
            border-radius: 8px;
            padding: 15px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            margin-top: 20px;
        }
        .log-entry {
            margin-bottom: 5px;
        }
        .log-time {
            color: #5a6f8f;
            margin-right: 8px;
        }
        .log-success {
            color: #00c853;
        }
        .log-error {
            color: #ff5252;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Bithumb卖1价测试</h1>
        
        <div class="panel">
            <button class="btn" onclick="fetchBithumbPrices()">🔄 获取Bithumb卖1价</button>
        </div>
        
        <div class="panel">
            <h3>📊 Bithumb卖1价数据</h3>
            <table id="priceTable">
                <thead>
                    <tr>
                        <th>币种</th>
                        <th>买1价 (KRW)</th>
                        <th>卖1价 (KRW)</th>
                        <th>最新价 (KRW)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="4" style="text-align: center; color: #5a6f8f;">点击按钮获取数据...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="panel">
            <h3>📋 系统日志</h3>
            <div class="log-panel" id="logPanel"></div>
        </div>
    </div>

    <script>
        // Bithumb API模块
        const BithumbAPI = {
            async getAllPrices() {
                try {
                    addLog('开始获取Bithumb API数据...', 'info');
                    const response = await fetch('https://api.bithumb.com/public/ticker/ALL_KRW');
                    addLog(`API响应状态: ${response.status} ${response.statusText}`, 'info');
                    
                    const data = await response.json();
                    
                    // 输出API响应的前几个币种数据，以便了解结构
                    addLog(`API响应状态: ${data.status}`, 'info');
                    if (data.data) {
                        const firstFewKeys = Object.keys(data.data).slice(0, 5);
                        firstFewKeys.forEach(key => {
                            if (key !== 'date') {
                                addLog(`API响应示例 - ${key}: ${JSON.stringify(data.data[key])}`, 'info');
                            }
                        });
                    }
                    
                    const prices = {};
                    if (data.status === '0000' && data.data) {
                        Object.keys(data.data).forEach(key => {
                            if (key !== 'date') {
                                const symbol = key.replace('_KRW', '');
                                const coinData = data.data[key];
                                
                                // 检查字段是否存在
                                const bidPrice = coinData.buy_price || coinData.bid || coinData.bid_price || null;
                                const askPrice = coinData.sell_price || coinData.ask || coinData.ask_price || null;
                                const lastPrice = coinData.closing_price || coinData.last || coinData.trade_price || null;
                                
                                prices[symbol] = {
                                    bid: bidPrice ? parseFloat(bidPrice) : null,
                                    ask: askPrice ? parseFloat(askPrice) : null,
                                    last: lastPrice ? parseFloat(lastPrice) : null
                                };
                                
                                addLog(`Bithumb ${symbol}: 买1价=${prices[symbol].bid}, 卖1价=${prices[symbol].ask}, 最新价=${prices[symbol].last}`, 'success');
                            }
                        });
                    }
                    
                    addLog(`Bithumb API获取到${Object.keys(prices).length}个币种的完整价格数据`, 'success');
                    return prices;
                } catch (error) {
                    addLog(`Bithumb API错误: ${error.message}`, 'error');
                    return {};
                }
            }
        };

        // 日志函数
        function addLog(message, type = 'info') {
            const logPanel = document.getElementById('logPanel');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = `<span class="log-time">[${time}]</span>${message}`;
            logPanel.appendChild(entry);
            logPanel.scrollTop = logPanel.scrollHeight;
            
            // 限制日志数量
            while (logPanel.children.length > 100) {
                logPanel.removeChild(logPanel.firstChild);
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num === undefined || num === null || isNaN(num)) return '-';
            return num.toLocaleString('ko-KR');
        }

        // 获取Bithumb价格数据
        async function fetchBithumbPrices() {
            const tableBody = document.getElementById('priceTable').querySelector('tbody');
            tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #5a6f8f;">正在获取数据...</td></tr>';
            
            try {
                const prices = await BithumbAPI.getAllPrices();
                
                if (Object.keys(prices).length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff5252;">没有获取到数据</td></tr>';
                    return;
                }
                
                // 按币种名称排序
                const sortedCoins = Object.keys(prices).sort();
                
                tableBody.innerHTML = sortedCoins.map(coin => {
                    const price = prices[coin];
                    return `
                        <tr>
                            <td><strong>${coin}</strong></td>
                            <td>${formatNumber(price.bid)}</td>
                            <td>${formatNumber(price.ask)}</td>
                            <td>${formatNumber(price.last)}</td>
                        </tr>
                    `;
                }).join('');
                
                addLog(`✅ 数据获取成功，显示${sortedCoins.length}个币种`, 'success');
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #ff5252;">获取数据失败</td></tr>';
                addLog(`❌ 获取数据失败: ${error.message}`, 'error');
            }
        }
    </script>
</body>
</html>
